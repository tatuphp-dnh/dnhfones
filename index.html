<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Azul</title>
    <style>
        body {
            background-color: #1E90FF; /* azul */
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            color: white;
        }
        img {
            margin-top: 20px;
            width: 150px;
        }
        .buttons {
            margin: 20px;
        }
        .buttons a {
            display: inline-block;
            background-color: #ffffff;
            color: #1E90FF;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }
        .buttons a:hover {
            background-color: #00bfff;
            color: white;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            justify-content: center;
            margin: 40px auto;
            width: 70%;
        }
        .photo-space {
            width: 100%;
            height: 200px;
            border: 3px dashed white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Fones de ouvido -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Headphones_Icon.png" alt="Fones de ouvido">

    <!-- Botões -->
    <div class="buttons">
        <a href="https://www.exemplo1.com" target="_blank">Link 1</a>
        <a href="https://www.exemplo2.com" target="_blank">Link 2</a>
    </div>

    <!-- Espaço para quatro fotos -->
    <div class="photo-grid">
        <div class="photo-space"><p>Foto 1</p></div>
        <div class="photo-space"><p>Foto 2</p></div>
        <div class="photo-space"><p>Foto 3</p></div>
        <div class="photo-space"><p>Foto 4</p></div>
    </div>
</body>
</html>
