<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Azul</title>
    <style>
        body {
            background-color: #1E90FF; /* azul */
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            color: white;
            margin: 0;
            padding-bottom: 80px; /* espaço para não sobrepor conteúdo */
        }
        img {
            margin-top: 20px;
            width: 150px;
        }
        .buttons {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .buttons a {
            display: inline-block;
            background-color: #ffffff;
            color: #1E90FF;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }
        .buttons a:hover {
            background-color: #00bfff;
            color: white;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            justify-content: center;
            margin: 40px auto;
            width: 70%;
        }
        .photo-space {
            width: 100%;
            height: 200px;
            border: 3px dashed white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Fones de ouvido -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Headphones_Icon.png" alt="Fones de ouvido">

    <!-- Espaço para quatro fotos -->
    <div class="photo-grid">
        <div class="https://github.com/tatuphp-dnh/dnhfones/commit/e2677cd3c46544157eaf7e00da7ec90b20d8a169"><p></p></div>
        <div class="https://www.google.com/search?sca_esv=d71bc1ae2c716a3c&rlz=1C1ISCS_pt-PTBR1040BR1040&sxsrf=ANbL-n6MkbBxrsaQmyn1Spb0YrqRAuRimg:1772560107641&udm=2&fbs=ADc_l-acAb_3MMOAUx0zmbUpgBqRiigBgL2I_pgQa-94zvB054Dys3s2x_Qm_GJcU2DlSXgs4i471_5vbbrE24Q_ZqrCatB7YnmDqpjaDf_BPVQIpjf978k-6sXBMDIlmbTUDepROtWwOsu_QbDkidANcerNawlVQiCfpO9X7Ah5GM77PNUFTztwQk1qxDIgTHhibYP7qNzv9eNOt1laHUVW-mLNfZvEtA&q=foto+kaidi&sa=X&ved=2ahUKEwiE-Lv8pISTAxXqIbkGHcNyENQQtKgLegQIFBAB&biw=1242&bih=583&dpr=1.1#sv=CAMSVhoyKhBlLUY0bGl3alY0RDRsT3VNMg5GNGxpd2pWNEQ0bE91TToOMUQ0SkpIamkyVmw5b00gBCocCgZtb3NhaWMSEGUtRjRsaXdqVjRENGxPdU0YADABGAcgzdW11Q4wAkoIEAIYAiACKAI"><p>Foto 2</p></div>
        <div class="photo-space"><p>Foto 3</p></div>
        <div class="photo-space"><p>Foto 4</p></div>
    </div>

    <!-- Botões fixados no rodapé -->
    <div class="buttons">
        <a href="https://mercadolivre.com/sec/1hz9hX3" target="_blank">saiba mais</a>
        <a href="https://www.instagram.com/dnh.fone?igsh=eGsxN3prNXp4Mmxj" target="_blank">instagran</a>
    </div>
</body>
</html>
